<!doctype html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="author" content="Nico">
    <meta name="keywords" content="Ciberseguridad, OSINT, IA, Phishing, Fuerza Bruta, Escaneo de Redes">
    <meta name="description"
        content="Notas completas de Ciberseguridad e Inteligencia Artificial, con técnicas OSINT, herramientas y laboratorios prácticos">

    <link rel="stylesheet" href="/Libreta/res/css/styles.css" type="text/css">
    <script src="/Libreta/res/js/script.js"></script>
</head>

<body>

    <div class="two-panels">

        <div class="tree-panel">
            <div class="tree">

                <!-- Índice Ini -->
                <div class="index-title">
                    <h1>Índice</h1>
                </div>

                <!-- Botones de control -->
                <div class="index-controls">
                    <button onclick="expandAllSubtrees()">Abrir</button>
                    <button onclick="collapseAllSubtrees()">Cerrar</button>
                </div>

                <!-- Buscador -->
                <div class="index-search">
                    <input type="text" id="tree_search" placeholder="Buscar... {!}" oninput="filterTree(this.value)">
                    <button id="tree_search_clear" onclick="clearTreeSearch()">✘</button>
                </div>

                <!-- Arbol de contenido -->
                <ul id="tree_root" class="outermost"></ul>

                <!-- ===================== FOOTER ===================== -->
                <div class="tree-footer">

                    <!-- Footer título -->
                    <div class="tree-footer-title">Autor</div>


                    <!-- Footer content -->
                    <div class="tree-footer-box">
                        <div><strong>Nombre:</strong> Nico</div>
                        <div><strong>Contacto:</strong> nicoletobondia06@gmail.com</div>
                        <div><strong>Proyecto:</strong> Notas</div>
                        <div><strong>Github Link:</strong><a href="https://github.com/Noocoks" target="_blank"
                                rel="noopener noreferrer"> Noocoks</a></div>
                    </div>
                </div>
                <!-- Índice Fin -->

            </div>
        </div>

        <div class="page-panel">
            <iframe id="page_frame"></iframe>
        </div>

    </div>
</body>

</html>
